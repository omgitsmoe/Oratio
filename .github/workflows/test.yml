name: Test

on: [push, pull_request]

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        node-version: [22]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable corepack
        run: corepack enable

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libx11-dev libxtst-dev libxt-dev libxinerama-dev libx11-xcb-dev libxkbcommon-dev libxkbcommon-x11-dev libxkbfile-dev

      - name: Install setuptools (node-gyp compat for Python 3.12+)
        if: runner.os == 'Windows'
        run: python -m pip install setuptools

      - name: Get Electron cache directory
        id: electron-cache-dir
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "path=$LOCALAPPDATA/electron/Cache" >> $GITHUB_OUTPUT
          elif [ "$RUNNER_OS" = "macOS" ]; then
            echo "path=$HOME/Library/Caches/electron" >> $GITHUB_OUTPUT
          else
            echo "path=$HOME/.cache/electron" >> $GITHUB_OUTPUT
          fi

      - uses: actions/cache@v4
        id: electron-cache
        with:
          path: ${{ steps.electron-cache-dir.outputs.path }}
          key: electron-v42-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: yarn install
        run: |
          yarn install --immutable --network-timeout 300000

      - name: yarn test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn package
          yarn lint
          yarn tsc
          yarn test
