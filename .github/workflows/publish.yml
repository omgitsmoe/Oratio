name: Publish

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest]
        node-version: [22]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable corepack
        run: corepack enable

      - name: Install setuptools (node-gyp compat for Python 3.12+)
        run: python -m pip install setuptools

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "path=$(yarn config get cacheFolder)" >> $env:GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.path }}
          key: yarn-cache-folder-os-${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-cache-folder-os-${{ runner.os }}-node-${{ matrix.node-version }}-
            yarn-cache-folder-os-${{ runner.os }}-

      - name: Get Electron cache directory
        id: electron-cache-dir
        run: echo "path=$(node -e "console.log(require('path').join(require('os').homedir(), '.cache', 'electron'))")" >> $env:GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: electron-cache
        with:
          path: ${{ steps.electron-cache-dir.outputs.path }}
          key: electron-v42-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: |
          yarn install

      - name: Publish releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
          PN_PUB: ${{ secrets.pnPub }}
          PN_SUB: ${{ secrets.pnSub }}
        run: |
          yarn postinstall && yarn build && yarn electron-builder --publish always --win
